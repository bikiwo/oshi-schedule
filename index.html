<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推しの予定帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  /* =====================
     CSS変数・リセット
  ===================== */
  :root {
    --bg:        #f0ede8;
    --surface:   #ffffff;
    --surface2:  #faf8f5;
    --border:    #ede9e3;
    --text-main: #2d2d2d;
    --text-sub:  #888;
    --text-mute: #bbb;
    --accent:    #e07b54;
    --accent-lt: rgba(224,123,84,0.12);
    --sun:       #e05555;
    --sat:       #4a80d4;
    --radius:    14px;
    --shadow:    0 2px 12px rgba(0,0,0,0.07);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text-main);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }

  /* =====================
     ローディング
  ===================== */
  #loading {
    position: fixed; inset: 0;
    background: var(--surface);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 9999;
    transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-icon { font-size: 40px; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-sub); font-weight: 700; letter-spacing: 0.1em; }

  /* エラー画面 */
  #error-screen {
    display: none;
    position: fixed; inset: 0;
    background: var(--surface);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    padding: 32px;
    text-align: center;
    z-index: 9998;
  }
  #error-screen.show { display: flex; }
  .error-icon { font-size: 48px; }
  .error-title { font-size: 16px; font-weight: 900; color: var(--text-main); }
  .error-msg { font-size: 12px; color: var(--text-sub); line-height: 1.7; }

  /* =====================
     ヘッダー
  ===================== */
  .header {
    background: var(--surface);
    padding: 14px 18px 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header-title {
    font-size: 19px; font-weight: 900;
    color: var(--text-main); letter-spacing: 0.02em;
  }
  .header-title span { color: var(--accent); }

  .month-nav {
    display: flex; align-items: center; gap: 8px;
  }
  .month-label {
    font-size: 13px; font-weight: 700; color: var(--text-sub);
    min-width: 80px; text-align: center;
  }
  .nav-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-sub);
    transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--border); }

  /* フィルター */
  .filter-bar {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 12px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 4px 13px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
    border: 1.5px solid; white-space: nowrap;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-chip.active-chip {
    color: #fff !important;
  }

  /* =====================
     カレンダー
  ===================== */
  .calendar-wrap {
    background: var(--surface);
    margin: 12px 12px 0;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cal-dow-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    padding: 6px 0 4px;
  }
  .cal-dow {
    text-align: center; font-size: 10px;
    font-weight: 700; color: var(--text-mute); letter-spacing: 0.05em;
  }
  .cal-dow.sun { color: var(--sun); }
  .cal-dow.sat { color: var(--sat); }

  .cal-body { position: relative; }

  .cal-week {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .cal-week:last-child { border-bottom: none; }

  .cal-day {
    min-height: 68px;
    padding: 4px 2px 2px;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .cal-day:last-child { border-right: none; }

  .day-num {
    font-size: 11px; font-weight: 700; color: var(--text-sub);
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin: 0 auto 2px;
  }
  .cal-day.is-sun .day-num { color: var(--sun); }
  .cal-day.is-sat .day-num { color: var(--sat); }
  .cal-day.is-today .day-num {
    background: var(--accent); color: #fff !important;
  }
  .cal-day.other-month .day-num { color: var(--text-mute); }

  /* 帯イベント */
  .week-bands {
    position: absolute;
    top: 28px; left: 0; right: 0;
    pointer-events: none;
  }
  .band {
    position: absolute;
    height: 17px;
    display: flex; align-items: center;
    padding: 0 5px;
    font-size: 9px; font-weight: 700; color: #fff;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    pointer-events: all; cursor: pointer;
    transition: opacity 0.15s;
    z-index: 1;
  }
  .band:hover { opacity: 0.82; }
  .band.row1 { top: 0; }
  .band.row2 { top: 19px; }
  .band.row3 { top: 38px; }
  .band.r-start { border-radius: 4px 0 0 4px; }
  .band.r-end   { border-radius: 0 4px 4px 0; }
  .band.r-full  { border-radius: 4px; }
  .band.r-mid   { border-radius: 0; }

  /* +N more */
  .band-more {
    position: absolute;
    font-size: 9px; font-weight: 700;
    color: var(--text-sub);
    pointer-events: all; cursor: pointer;
  }

  /* =====================
     リスト
  ===================== */
  .list-section {
    margin: 12px 12px 0;
  }
  .list-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 4px; margin-bottom: 8px;
  }
  .list-label {
    font-size: 10px; font-weight: 700;
    color: var(--text-mute); letter-spacing: 0.15em;
  }
  .list-count {
    font-size: 10px; color: var(--text-mute);
  }

  .list-empty {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 20px;
    text-align: center;
    color: var(--text-mute);
    font-size: 13px;
    box-shadow: var(--shadow);
  }
  .list-empty span { display: block; font-size: 32px; margin-bottom: 8px; }

  .event-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .event-card:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,0.1); }
  .event-card:active { transform: translateY(0); }

  .card-bar { width: 5px; flex-shrink: 0; }
  .card-body { padding: 12px 14px; flex: 1; min-width: 0; }

  .card-top {
    display: flex; align-items: flex-start;
    gap: 8px; margin-bottom: 4px;
  }
  .card-name {
    font-size: 13px; font-weight: 700;
    color: var(--text-main); line-height: 1.4;
    flex: 1; min-width: 0;
  }
  .card-tag {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
    white-space: nowrap; flex-shrink: 0;
  }
  .card-meta {
    font-size: 11px; color: var(--text-sub);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .card-memo {
    margin-top: 7px; font-size: 11px;
    color: var(--text-sub); background: var(--surface2);
    padding: 6px 9px; border-radius: 6px;
    border-left: 2px solid var(--border); line-height: 1.6;
  }

  /* =====================
     詳細モーダル
  ===================== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 500;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 560px;
    padding: 20px 20px 40px;
    transform: translateY(20px);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 85vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border); border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-tag {
    display: inline-block;
    font-size: 11px; font-weight: 700;
    padding: 3px 12px; border-radius: 12px;
    margin-bottom: 10px;
  }
  .modal-title {
    font-size: 17px; font-weight: 900;
    line-height: 1.4; margin-bottom: 12px;
  }
  .modal-row {
    display: flex; gap: 8px; align-items: flex-start;
    margin-bottom: 8px; font-size: 13px; color: var(--text-sub);
  }
  .modal-row-icon { width: 20px; text-align: center; flex-shrink: 0; }
  .modal-memo-box {
    margin-top: 14px; background: var(--surface2);
    border-radius: 10px; padding: 12px 14px;
    font-size: 13px; color: var(--text-sub);
    line-height: 1.7; border-left: 3px solid var(--border);
  }
  .modal-memo-label {
    font-size: 10px; font-weight: 700;
    color: var(--text-mute); letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .modal-close {
    width: 100%; margin-top: 16px;
    padding: 13px; border-radius: 12px;
    background: var(--surface2); font-size: 13px;
    font-weight: 700; color: var(--text-sub);
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--border); }

  /* =====================
     レスポンシブ（PC）
  ===================== */
  @media (min-width: 600px) {
    .header { padding: 16px 24px 0; }
    .calendar-wrap { margin: 16px 16px 0; }
    .list-section { margin: 16px 16px 0; }
    .cal-day { min-height: 80px; }
    .modal { border-radius: 16px; margin: auto; margin-bottom: 0; }
    .modal-overlay { align-items: center; }
  }
</style>
</head>
<body>

<!-- ローディング -->
<div id="loading">
  <div class="loading-icon">🌸</div>
  <div class="loading-text">データを読み込み中...</div>
</div>

<!-- エラー -->
<div id="error-screen">
  <div class="error-icon">😢</div>
  <div class="error-title">データを読み込めませんでした</div>
  <div class="error-msg" id="error-msg">スプレッドシートの設定を確認してください。<br>SHEET_ID が正しく設定されているか確認してみてください。</div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-top">
    <div class="header-title">推しの<span>予定帳</span></div>
    <div class="month-nav">
      <button class="nav-btn" id="prev-btn">‹</button>
      <div class="month-label" id="month-label">2025年5月</div>
      <button class="nav-btn" id="next-btn">›</button>
    </div>
  </div>
  <div class="filter-bar" id="filter-bar">
    <!-- JSで生成 -->
  </div>
</div>

<!-- カレンダー -->
<div class="calendar-wrap">
  <div class="cal-dow-row">
    <div class="cal-dow sun">日</div>
    <div class="cal-dow">月</div>
    <div class="cal-dow">火</div>
    <div class="cal-dow">水</div>
    <div class="cal-dow">木</div>
    <div class="cal-dow">金</div>
    <div class="cal-dow">土</div>
  </div>
  <div class="cal-body" id="cal-body"></div>
</div>

<!-- リスト -->
<div class="list-section">
  <div class="list-header">
    <div class="list-label">UPCOMING EVENTS</div>
    <div class="list-count" id="list-count"></div>
  </div>
  <div id="event-list"></div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
    <button class="modal-close" id="modal-close">閉じる</button>
  </div>
</div>

<script>
// ============================================================
//  ★★★ ここを自分のスプレッドシートIDに書き換えてください ★★★
//  スプレッドシートのURL:
//  https://docs.google.com/spreadsheets/d/【ここのID】/edit
// ============================================================
const SHEET_ID = 'e/2PACX-1vTfd9rGytzm33oxP0O197KHhhCBZFgoywpeUwrjBUmNPTi-VNYKZnhp3b2W2VcnwTbkje4h9LBg3nKm';

// シート名（デフォルトは Sheet1）
const SHEET_NAME = 'Sheet1';

// ============================================================
//  スプレッドシートの列フォーマット（1行目はヘッダー）
//  A: タイトル
//  B: 開始日（例: 2025/5/3）
//  C: 終了日（例: 2025/5/5、1日のみのときは開始日と同じか空欄）
//  D: 場所
//  E: タグ（例: ホロライブ）
//  F: メモ
// ============================================================

// タグごとの色（タグ名: カラーコード）
// ★ 自分のタグに合わせて自由に追加・変更してください
const TAG_COLORS = {
  'ホロライブ': '#d44f8e',
  'アイマス':   '#4a80d4',
  'コミケ':     '#3aa875',
  '声優':       '#9b59b6',
  'にじさんじ': '#e07b54',
  'その他':     '#aaa',
};

// デフォルト色（タグが未登録の場合）
const DEFAULT_COLOR = '#aaa';

// ============================================================
//  内部状態
// ============================================================
let allEvents = [];         // 全イベント
let activeTag = 'すべて';  // 選択中フィルター
let currentYear, currentMonth; // 表示中の年月

// ============================================================
//  起動
// ============================================================
(async () => {
  const today = new Date();
  currentYear  = today.getFullYear();
  currentMonth = today.getMonth(); // 0-indexed

  if (SHEET_ID === 'YOUR_SHEET_ID_HERE') {
    // デモモード：サンプルデータで表示
    allEvents = getSampleEvents();
    hideLoading();
    init();
  } else {
    try {
      allEvents = await fetchSheet();
      hideLoading();
      init();
    } catch (e) {
      showError(e.message);
    }
  }
})();

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hidden');
  setTimeout(() => el.style.display = 'none', 400);
}
function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').classList.add('show');
  document.getElementById('error-msg').textContent = msg;
}

// ============================================================
//  スプレッドシート取得
// ============================================================
async function fetchSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`スプレッドシートの取得に失敗しました (${res.status})`);
  const csv = await res.text();
  return parseCSV(csv);
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const events = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (!cols[0] || !cols[1]) continue;
    const title  = clean(cols[0]);
    const start  = parseDate(clean(cols[1]));
    const end    = cols[2] && clean(cols[2]) ? parseDate(clean(cols[2])) : new Date(start);
    const place  = clean(cols[3] || '');
    const tag    = clean(cols[4] || 'その他');
    const memo   = clean(cols[5] || '');
    if (!start) continue;
    events.push({ title, start, end, place, tag, memo });
  }
  return events.sort((a, b) => a.start - b.start);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

function clean(s) { return s.replace(/^"|"$/g, '').trim(); }

function parseDate(s) {
  if (!s) return null;
  const m = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!m) return null;
  return new Date(+m[1], +m[2] - 1, +m[3]);
}

// ============================================================
//  サンプルデータ（SHEET_ID未設定時のデモ用）
// ============================================================
function getSampleEvents() {
  const y = new Date().getFullYear();
  const m = new Date().getMonth();
  const d = (day) => new Date(y, m, day);
  return [
    { title: 'hololive SUPER EXPO 2025',          start: d(3),  end: d(3),  place: '幕張メッセ',               tag: 'ホロライブ', memo: 'チケット申込期限に注意！グッズ先行もチェック' },
    { title: '花澤香菜 LIVE TOUR 2025',            start: d(9),  end: d(10), place: 'Zepp Haneda',             tag: '声優',       memo: '' },
    { title: 'THE IDOLM@STER MILLION LIVE! 12th', start: d(17), end: d(18), place: 'さいたまスーパーアリーナ', tag: 'アイマス',   memo: '2日間参戦予定！' },
    { title: 'コミックマーケット107',              start: d(24), end: d(26), place: '東京ビッグサイト',         tag: 'コミケ',     memo: 'サークルチェックまだ！壁サー優先で回る' },
    { title: 'にじさんじ甲子園 2025',              start: d(28), end: d(28), place: '京セラドーム大阪',         tag: 'にじさんじ', memo: '' },
  ];
}

// ============================================================
//  初期化
// ============================================================
function init() {
  buildFilterBar();
  render();

  document.getElementById('prev-btn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  });

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('modal-close').addEventListener('click', closeModal);
}

// ============================================================
//  フィルターバー
// ============================================================
function buildFilterBar() {
  const tags = ['すべて', ...new Set(allEvents.map(e => e.tag))];
  const bar  = document.getElementById('filter-bar');
  bar.innerHTML = '';
  tags.forEach(tag => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (tag === activeTag ? ' active-chip' : '');
    chip.textContent = tag;
    const color = tag === 'すべて' ? '#e07b54' : (TAG_COLORS[tag] || DEFAULT_COLOR);
    chip.style.borderColor = color;
    chip.style.color = tag === activeTag ? '#fff' : color;
    if (tag === activeTag) chip.style.background = color;
    chip.addEventListener('click', () => { activeTag = tag; buildFilterBar(); render(); });
    bar.appendChild(chip);
  });
}

// ============================================================
//  フィルター済みイベント
// ============================================================
function filteredEvents() {
  return activeTag === 'すべて' ? allEvents : allEvents.filter(e => e.tag === activeTag);
}

function eventsInMonth(y, m) {
  const first = new Date(y, m, 1);
  const last  = new Date(y, m + 1, 0);
  return filteredEvents().filter(e => e.start <= last && e.end >= first);
}

// ============================================================
//  メインレンダー
// ============================================================
function render() {
  const y = currentYear, m = currentMonth;
  const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-label').textContent = `${y}年${MONTHS[m]}`;
  renderCalendar(y, m);
  renderList(y, m);
}

// ============================================================
//  カレンダー描画
// ============================================================
function renderCalendar(y, m) {
  const body   = document.getElementById('cal-body');
  body.innerHTML = '';

  const today  = new Date();
  const first  = new Date(y, m, 1);
  const last   = new Date(y, m + 1, 0);
  const startDow = first.getDay(); // 0=日
  const totalDays = last.getDate();

  // グリッド上の全セル
  const cells = [];
  for (let i = 0; i < startDow; i++) {
    const d = new Date(y, m, -startDow + i + 1);
    cells.push({ date: d, curMonth: false });
  }
  for (let d = 1; d <= totalDays; d++) {
    cells.push({ date: new Date(y, m, d), curMonth: true });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1].date;
    cells.push({ date: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1), curMonth: false });
  }

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

  const monthEvents = eventsInMonth(y, m);

  weeks.forEach(week => {
    const weekEl = document.createElement('div');
    weekEl.className = 'cal-week';

    // 日付セル
    week.forEach(cell => {
      const dayEl = document.createElement('div');
      const dow   = cell.date.getDay();
      let cls = 'cal-day';
      if (!cell.curMonth) cls += ' other-month';
      if (dow === 0) cls += ' is-sun';
      if (dow === 6) cls += ' is-sat';
      if (isSameDay(cell.date, today)) cls += ' is-today';
      dayEl.className = cls;
      dayEl.innerHTML = `<div class="day-num">${cell.date.getDate()}</div>`;
      weekEl.appendChild(dayEl);
    });

    // 帯レイヤー
    const bandsEl = document.createElement('div');
    bandsEl.className = 'week-bands';

    const weekStart = week[0].date;
    const weekEnd   = week[6].date;

    // この週に表示するイベントを特定し、行を割り当て
    const rowAssign = {}; // eventIndex -> row (0,1,2)
    const rowUsed   = [[], [], []]; // 各行の使用col

    monthEvents.forEach((ev, ei) => {
      if (ev.end < weekStart || ev.start > weekEnd) return;
      const clipStart = ev.start < weekStart ? weekStart : ev.start;
      const clipEnd   = ev.end   > weekEnd   ? weekEnd   : ev.end;
      const colStart  = dayDiff(weekStart, clipStart);
      const colEnd    = dayDiff(weekStart, clipEnd);
      // 空いている行を探す
      for (let row = 0; row < 3; row++) {
        const conflict = rowUsed[row].some(([s, e]) => !(colEnd < s || colStart > e));
        if (!conflict) {
          rowUsed[row].push([colStart, colEnd]);
          rowAssign[ei] = { row, colStart, colEnd };
          break;
        }
      }
    });

    // 帯を描画
    monthEvents.forEach((ev, ei) => {
      const info = rowAssign[ei];
      if (!info) return;
      const { row, colStart, colEnd } = info;
      const span    = colEnd - colStart + 1;
      const colW    = 100 / 7;
      const isStart = ev.start >= weekStart;
      const isEnd   = ev.end   <= weekEnd;
      const rClass  = isStart && isEnd ? 'r-full' : isStart ? 'r-start' : isEnd ? 'r-end' : 'r-mid';
      const color   = TAG_COLORS[ev.tag] || DEFAULT_COLOR;

      const band = document.createElement('div');
      band.className = `band row${row + 1} ${rClass}`;
      band.style.left  = `calc(${colW * colStart}% + 2px)`;
      band.style.width = `calc(${colW * span}% - 4px)`;
      band.style.background = color;
      band.textContent = isStart ? ev.title : '';
      band.title = ev.title;
      band.addEventListener('click', () => openModal(ev));
      bandsEl.appendChild(band);
    });

    weekEl.appendChild(bandsEl);
    body.appendChild(weekEl);
  });
}

// ============================================================
//  リスト描画
// ============================================================
function renderList(y, m) {
  const events = eventsInMonth(y, m);
  const list   = document.getElementById('event-list');
  const count  = document.getElementById('list-count');
  list.innerHTML = '';
  count.textContent = events.length > 0 ? `${events.length}件` : '';

  if (events.length === 0) {
    list.innerHTML = '<div class="list-empty"><span>📭</span>この月のイベントはありません</div>';
    return;
  }

  events.forEach(ev => {
    const color = TAG_COLORS[ev.tag] || DEFAULT_COLOR;
    const card  = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div class="card-bar" style="background:${color}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">${esc(ev.title)}</div>
          <div class="card-tag" style="background:${color}18;color:${color}">${esc(ev.tag)}</div>
        </div>
        <div class="card-meta">
          <span>📅 ${formatDateRange(ev.start, ev.end)}</span>
          ${ev.place ? `<span>📍 ${esc(ev.place)}</span>` : ''}
        </div>
        ${ev.memo ? `<div class="card-memo">📝 ${esc(ev.memo)}</div>` : ''}
      </div>
    `;
    card.addEventListener('click', () => openModal(ev));
    list.appendChild(card);
  });
}

// ============================================================
//  モーダル
// ============================================================
function openModal(ev) {
  const color = TAG_COLORS[ev.tag] || DEFAULT_COLOR;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-tag" style="background:${color}18;color:${color}">${esc(ev.tag)}</div>
    <div class="modal-title">${esc(ev.title)}</div>
    <div class="modal-row">
      <span class="modal-row-icon">📅</span>
      <span>${formatDateRange(ev.start, ev.end)}</span>
    </div>
    ${ev.place ? `
    <div class="modal-row">
      <span class="modal-row-icon">📍</span>
      <span>${esc(ev.place)}</span>
    </div>` : ''}
    ${ev.memo ? `
    <div class="modal-memo-box">
      <div class="modal-memo-label">MEMO</div>
      ${esc(ev.memo)}
    </div>` : ''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ============================================================
//  ユーティリティ
// ============================================================
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function dayDiff(a, b) {
  return Math.round((b - a) / 86400000);
}

function formatDateRange(start, end) {
  const fmt = d => {
    const DAYS = ['日','月','火','水','木','金','土'];
    return `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
  };
  if (isSameDay(start, end)) return fmt(start);
  return `${fmt(start)} 〜 ${fmt(end)}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
